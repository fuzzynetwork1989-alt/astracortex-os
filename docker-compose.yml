services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: astra
      POSTGRES_PASSWORD: astra
      POSTGRES_DB: astracortex
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backend/db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U astra -d astracortex"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://astra:astra@postgres:5432/astracortex
      REDIS_URL: redis://redis:6379/0
      UPLOAD_DIR: /data/uploads
      OLLAMA_BASE_URL: http://host.docker.internal:11434
      INFERENCE_MODE: hybrid
      ALLOW_CORS_ALL: "true"
      PUBLIC_API_URL: http://127.0.0.1:8000
      # Do not bind-mount app code with reload — that killed connections mid-request
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "8000:8000"
    volumes:
      - ./data/uploads:/data/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    # Give LLM calls time; prevent proxy-side kills
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8000/ready"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 45s

  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # Browser talks DIRECTLY to host API — never through Next rewrite proxy
        NEXT_PUBLIC_API_URL: http://127.0.0.1:8000
    environment:
      NEXT_PUBLIC_API_URL: http://127.0.0.1:8000
    ports:
      - "3000:3000"
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:
